services:
  db:
    image: mysql:8.0
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      # Host 3307 -> container 3306 (evita conflito com MySQL local na 3306).
      # O backend acessa o banco pela rede interna (DB_HOST=db:3306).
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    env_file: .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: ./backend
    command: celery -A config worker -l info
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis

  beat:
    build: ./backend
    command: celery -A config beat -l info
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis

  backup:
    image: mysql:8.0
    entrypoint: ["/bin/sh", "/backup.sh"]
    env_file: .env
    volumes:
      - ./ops/backup.sh:/backup.sh:ro
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev
    env_file: .env
    environment:
      # Windows + bind mount não propaga eventos inotify; polling garante o hot-reload.
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
